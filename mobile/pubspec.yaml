name: local_share_mobile
description: A native P2P file sharing app for the Local Share ecosystem.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.3
  nsd: ^4.1.0
  socket_io_client: ^3.1.4
  dio: ^5.9.2
  path_provider: ^2.1.5
  file_picker: ^10.3.10
  permission_handler: ^11.4.0
  intl: ^0.19.0
  crypto: ^3.0.7
  provider: ^6.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
